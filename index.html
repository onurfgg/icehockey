<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buz Hokeyi 2D | Neon Air Hockey</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --ice-color: #e0f2fe;
            --player-color: #3b82f6;
            --ai-color: #ef4444;
            --puck-color: #1e293b;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden; flex-direction: column;
        }

        /* --- YENİ: SOSYAL MEDYA BUTONLARI --- */
        .social-container {
            position: absolute; top: 20px; left: 20px; z-index: 15;
            display: flex; gap: 10px;
        }

        .social-btn {
            color: white; text-decoration: none;
            padding: 10px 15px; border-radius: 8px; font-weight: bold; font-size: 14px;
            display: flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); transition: 0.3s;
        }
        
        .btn-linkedin { background: #0077b5; }
        .btn-linkedin:hover { background: #005885; transform: translateY(-2px); }
        
        .btn-github { background: #24292e; }
        .btn-github:hover { background: #1b1f23; transform: translateY(-2px); }

        .scoreboard {
            position: absolute; top: 20px;
            display: flex; gap: 40px;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            padding: 15px 40px; border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white; font-size: 28px; font-weight: 900;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5); z-index: 10;
        }

        .score-box { display: flex; flex-direction: column; align-items: center; }
        .score-label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.7; margin-bottom: 5px; }

        #player-score { color: var(--player-color); text-shadow: 0 0 10px var(--player-color); }
        #ai-score { color: var(--ai-color); text-shadow: 0 0 10px var(--ai-color); }

        #gameCanvas {
            background-color: var(--ice-color);
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(59, 130, 246, 0.2), inset 0 0 40px rgba(255,255,255,1);
            border: 6px solid #94a3b8;
        }

        .controls-info {
            position: absolute; bottom: 20px;
            color: rgba(255, 255, 255, 0.5); font-size: 13px; letter-spacing: 1px;
            text-align: center;
        }
        .controls-info span { font-weight: bold; color: white; }

        /* --- MENÜ VE EKRANLAR --- */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(8px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 20; color: white; transition: 0.3s;
        }

        .overlay.hidden { display: none !important; }

        .menu-box {
            background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1); text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6); width: 300px;
        }

        .menu-box h2 { margin-top: 0; margin-bottom: 25px; font-size: 26px; font-weight: 900; letter-spacing: 1px; text-shadow: 0 0 15px rgba(255,255,255,0.5); }
        
        .setting-group { margin-bottom: 20px; text-align: left; }
        .setting-group label { display: block; font-size: 11px; text-transform: uppercase; margin-bottom: 8px; color: #cbd5e1; font-weight: bold;}
        .setting-group select { 
            width: 100%; padding: 12px; border-radius: 8px; border: none; 
            background: rgba(255,255,255,0.9); font-weight: bold; cursor: pointer; outline: none; font-size: 14px;
        }

        .btn-start {
            background: var(--player-color); color: white; border: none;
            padding: 14px 0; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: 0.2s; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }
        .btn-start:hover { background: #2563eb; transform: translateY(-2px); box-shadow: 0 0 25px rgba(59, 130, 246, 0.8); }

        #game-over-title { font-size: 38px; margin-bottom: 10px; font-weight: 900; }
        #final-score-text { font-size: 18px; color: #94a3b8; margin-bottom: 30px; font-weight: bold;}

        /* Mobilde Scoreboard'u ve Butonları Sığdır */
        @media screen and (max-width: 768px) {
            .social-container {
                top: 10px; left: 5vw; width: 90vw; justify-content: space-between; gap: 8px;
            }
            .social-btn {
                font-size: 11px; padding: 8px 5px; flex: 1; justify-content: center;
            }
            .scoreboard { padding: 10px 20px; gap: 20px; font-size: 20px; top: 60px; }
            #gameCanvas { width: 95vw; height: auto; aspect-ratio: 4/6; margin-top: 30px;}
        }
    </style>
</head>
<body>

    <div class="social-container">
        <a href="https://linkedin.com/in/onurfurkan" target="_blank" class="social-btn btn-linkedin">
            <i class="fab fa-linkedin"></i> Onur Furkan Gök
        </a>
        <a href="https://github.com/onurfgg" target="_blank" class="social-btn btn-github">
            <i class="fab fa-github"></i> Onur Furkan Gök
        </a>
    </div>

    <div id="start-menu" class="overlay">
        <div class="menu-box">
            <h2>NEON AIR HOCKEY</h2>
            <div class="setting-group">
                <label>Zorluk Seviyesi</label>
                <select id="difficulty-select">
                    <option value="3">Çırak (Kolay)</option>
                    <option value="4.5" selected>Profesyonel (Orta)</option>
                    <option value="6.5">Şampiyon (Zor)</option>
                </select>
            </div>
            <div class="setting-group">
                <label>Hedef Skor (Bitiş)</label>
                <select id="target-score-select">
                    <option value="3">3 Golde Biter</option>
                    <option value="5" selected>5 Golde Biter</option>
                    <option value="7">7 Golde Biter</option>
                </select>
            </div>
            <button class="btn-start" id="start-btn">Buz Piste Çık</button>
        </div>
    </div>

    <div id="game-over-menu" class="overlay hidden">
        <div class="menu-box">
            <h2 id="game-over-title">KAZANDIN!</h2>
            <div id="final-score-text">Sen 5 - 3 AI</div>
            <button class="btn-start" id="restart-btn">Rövanş İste</button>
        </div>
    </div>

    <div class="scoreboard">
        <div class="score-box">
            <span class="score-label">A.I. Model</span>
            <span id="ai-score">0</span>
        </div>
        <div class="score-box" style="color: rgba(255,255,255,0.2);">|</div>
        <div class="score-box">
            <span class="score-label">Oyuncu</span>
            <span id="player-score">0</span>
        </div>
    </div>

    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <div class="controls-info">Kontrol: <span>WASD</span> veya <span>Ok Tuşları</span> ile oynayın.</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let gameState = "menu"; 
        let targetScore = 5;
        let goalMessage = "";

        // YENİ: A.I. Köşe Sıkışması Çözümü İçin Değişkenler
        let cornerTimer = 0;
        let aiRetreating = false;

        // --- OYUN NESNELERİ VE FİZİK ---
        const puck = {
            x: canvas.width / 2, y: canvas.height / 2,
            radius: 12, mass: 1, vx: 0, vy: 0,
            color: "#1e293b",
            maxSpeed: 25, 
            friction: 0.985, 
            trail: [] 
        };

        const player = {
            x: canvas.width / 2, y: canvas.height - 50,
            radius: 22, mass: 5, vx: 0, vy: 0,
            speed: 7, color: "#3b82f6", score: 0
        };

        const ai = {
            x: canvas.width / 2, y: 50,
            radius: 22, mass: 5, vx: 0, vy: 0,
            speed: 4.5, color: "#ef4444", score: 0
        };

        const goalWidth = 130; 

        // --- WASD VE OK TUŞLARI KONTROLÜ ---
        const keys = { up: false, down: false, left: false, right: false };

        window.addEventListener("keydown", (e) => {
            let key = e.key.toLowerCase();
            if (key === "w" || e.key === "ArrowUp") { keys.up = true; e.preventDefault(); }
            if (key === "s" || e.key === "ArrowDown") { keys.down = true; e.preventDefault(); }
            if (key === "a" || e.key === "ArrowLeft") { keys.left = true; e.preventDefault(); }
            if (key === "d" || e.key === "ArrowRight") { keys.right = true; e.preventDefault(); }
        });

        window.addEventListener("keyup", (e) => {
            let key = e.key.toLowerCase();
            if (key === "w" || e.key === "ArrowUp") keys.up = false;
            if (key === "s" || e.key === "ArrowDown") keys.down = false;
            if (key === "a" || e.key === "ArrowLeft") keys.left = false;
            if (key === "d" || e.key === "ArrowRight") keys.right = false;
        });

        // --- MENÜ KONTROLLERİ ---
        document.getElementById('start-btn').addEventListener('click', () => {
            ai.speed = parseFloat(document.getElementById('difficulty-select').value);
            targetScore = parseInt(document.getElementById('target-score-select').value);
            startGame();
        });

        document.getElementById('restart-btn').addEventListener('click', () => {
            document.getElementById('game-over-menu').classList.add('hidden');
            document.getElementById('start-menu').classList.remove('hidden');
        });

        function startGame() {
            player.score = 0; ai.score = 0;
            cornerTimer = 0; aiRetreating = false; // Sıfırla
            document.getElementById("player-score").innerText = player.score;
            document.getElementById("ai-score").innerText = ai.score;
            document.getElementById('start-menu').classList.add('hidden');
            resetPuck('player');
            gameState = "playing";
        }

        // --- ÇİZİM FONKSİYONLARI ---
        function drawSaha() {
            ctx.shadowBlur = 0; 
            
            ctx.beginPath(); ctx.arc(canvas.width / 2, 0, 80, 0, Math.PI); 
            ctx.strokeStyle = "rgba(239, 68, 68, 0.2)"; ctx.lineWidth = 3; ctx.stroke();
            
            ctx.beginPath(); ctx.arc(canvas.width / 2, canvas.height, 80, Math.PI, Math.PI * 2); 
            ctx.strokeStyle = "rgba(59, 130, 246, 0.2)"; ctx.lineWidth = 3; ctx.stroke();

            ctx.beginPath(); ctx.moveTo(0, canvas.height / 2); ctx.lineTo(canvas.width, canvas.height / 2);
            ctx.strokeStyle = "rgba(148, 163, 184, 0.5)"; ctx.lineWidth = 4; ctx.stroke();

            ctx.beginPath(); ctx.arc(canvas.width / 2, canvas.height / 2, 60, 0, Math.PI * 2); ctx.stroke();
            ctx.beginPath(); ctx.arc(canvas.width / 2, canvas.height / 2, 6, 0, Math.PI * 2); ctx.fillStyle = "rgba(148, 163, 184, 0.5)"; ctx.fill();

            ctx.beginPath(); ctx.rect((canvas.width - goalWidth) / 2, 0, goalWidth, 12); 
            ctx.fillStyle = "rgba(239, 68, 68, 0.8)"; ctx.fill();

            ctx.beginPath(); ctx.rect((canvas.width - goalWidth) / 2, canvas.height - 12, goalWidth, 12); 
            ctx.fillStyle = "rgba(59, 130, 246, 0.8)"; ctx.fill();
        }

        function drawPuckTrail() {
            for (let i = 0; i < puck.trail.length; i++) {
                let alpha = i / puck.trail.length;
                ctx.beginPath();
                ctx.arc(puck.trail[i].x, puck.trail[i].y, puck.radius * alpha * 0.8, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(30, 41, 59, ${alpha * 0.4})`;
                ctx.fill();
            }
        }

        function drawCircle(obj, isPuck = false) {
            ctx.shadowBlur = 15;
            ctx.shadowColor = obj.color;
            
            ctx.beginPath(); 
            ctx.arc(obj.x, obj.y, obj.radius, 0, Math.PI * 2);
            ctx.fillStyle = obj.color; 
            ctx.fill();
            
            ctx.shadowBlur = 0; 

            if (!isPuck) {
                ctx.beginPath(); ctx.arc(obj.x, obj.y, obj.radius * 0.4, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(255,255,255,0.4)"; ctx.fill();
                ctx.beginPath(); ctx.arc(obj.x, obj.y, obj.radius * 0.2, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(255,255,255,0.8)"; ctx.fill();
            }
        }

        // --- MÜKEMMELLEŞTİRİLMİŞ FİZİK ---
        function checkCollision(obj, p) {
            let dx = p.x - obj.x;
            let dy = p.y - obj.y;
            let distance = Math.sqrt(dx * dx + dy * dy);

            if (distance < obj.radius + p.radius) {
                let angle = Math.atan2(dy, dx);
                let sin = Math.sin(angle);
                let cos = Math.cos(angle);

                let overlap = obj.radius + p.radius - distance;
                
                p.x += cos * overlap;
                p.y += sin * overlap;

                p.x = Math.max(p.radius, Math.min(canvas.width - p.radius, p.x));
                p.y = Math.max(p.radius, Math.min(canvas.height - p.radius, p.y));
                
                let forceRatio = 0.8; 
                let bounceBoost = 6; 
                
                p.vx += obj.vx * forceRatio + (cos * bounceBoost);
                p.vy += obj.vy * forceRatio + (sin * bounceBoost);

                let currentSpeed = Math.sqrt(p.vx**2 + p.vy**2);
                if(currentSpeed > p.maxSpeed) {
                    p.vx = (p.vx / currentSpeed) * p.maxSpeed;
                    p.vy = (p.vy / currentSpeed) * p.maxSpeed;
                }
            }
        }

        // --- OYUN MANTIĞI ---
        function resetPuck(scorer) {
            puck.x = canvas.width / 2; puck.y = canvas.height / 2;
            puck.vx = 0; puck.vy = scorer === 'player' ? -4 : 4; 
            puck.trail = []; 
            player.x = canvas.width / 2; player.y = canvas.height - 50;
            ai.x = canvas.width / 2; ai.y = 50;
            cornerTimer = 0; aiRetreating = false;
        }

        function handleGoal(scorer) {
            gameState = "scored";
            if (scorer === 'player') {
                player.score++;
                document.getElementById("player-score").innerText = player.score;
                goalMessage = "GOL! (SEN)";
            } else {
                ai.score++;
                document.getElementById("ai-score").innerText = ai.score;
                goalMessage = "GOL! (A.I.)"; 
            }

            if (player.score >= targetScore || ai.score >= targetScore) {
                setTimeout(() => {
                    gameState = "gameover";
                    document.getElementById('game-over-menu').classList.remove('hidden');
                    const title = document.getElementById('game-over-title');
                    title.innerText = player.score >= targetScore ? "ŞAMPİYON! 🏆" : "KAYBETTİN! 💻";
                    title.style.color = player.score >= targetScore ? "var(--player-color)" : "var(--ai-color)";
                    document.getElementById('final-score-text').innerText = `Sen ${player.score} - ${ai.score} A.I. Model`;
                }, 1000);
            } else {
                setTimeout(() => {
                    resetPuck(scorer === 'player' ? 'ai' : 'player');
                    gameState = "playing";
                }, 1500);
            }
        }

        function update() {
            // 1. Oyuncu (WASD + Oklar)
            player.vx = 0; player.vy = 0;
            if (keys.left) player.vx = -player.speed;
            if (keys.right) player.vx = player.speed;
            if (keys.up) player.vy = -player.speed;
            if (keys.down) player.vy = player.speed;

            player.x += player.vx; player.y += player.vy;
            player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
            player.y = Math.max(canvas.height / 2 + player.radius, Math.min(canvas.height - player.radius, player.y));

            // YENİ: A.I. KÖŞE SIKIŞMASI (TRAP) ÇÖZÜMÜ
            // Top yapay zeka sahasında ve köşelerde mi?
            let inCorner = puck.y < 80 && (puck.x < 80 || puck.x > canvas.width - 80);

            if (inCorner) {
                cornerTimer += 16.6; // ~60fps'de milisaniye sayacı
                if (cornerTimer >= 2000) { // 2 Saniye geçtiyse
                    aiRetreating = true;
                }
            } else {
                cornerTimer = 0; // Top köşeden çıktıysa sayacı sıfırla
            }

            if (aiRetreating) {
                // Sıkışmayı çözmek için A.I. geri çekilip "Şut" pozisyonu alıyor
                let targetX = canvas.width / 2;
                let targetY = 150; // Sahanın gerisine çekil
                
                if (ai.x < targetX - 5) ai.vx = ai.speed;
                else if (ai.x > targetX + 5) ai.vx = -ai.speed;
                else ai.vx = 0;

                if (ai.y < targetY - 5) ai.vy = ai.speed;
                else if (ai.y > targetY + 5) ai.vy = -ai.speed;
                else ai.vy = 0;

                // Geri çekilme noktasına ulaştıysa tekrar saldırıya geç!
                if (Math.abs(ai.x - targetX) <= 10 && Math.abs(ai.y - targetY) <= 10) {
                    aiRetreating = false;
                    cornerTimer = 0; 
                }
            } else {
                // 2. Normal Yapay Zeka Hareketi
                let aiTargetX = puck.x;
                if (puck.y < canvas.height / 2) {
                    if (ai.x < aiTargetX - 10) ai.vx = ai.speed;
                    else if (ai.x > aiTargetX + 10) ai.vx = -ai.speed;
                    else ai.vx = 0;
                    
                    if (ai.y < puck.y - 15) ai.vy = ai.speed;
                    else if (ai.y > puck.y + 15) ai.vy = -ai.speed;
                    else ai.vy = 0;
                } else {
                    if (ai.x < canvas.width / 2 - 10) ai.vx = ai.speed * 0.5;
                    else if (ai.x > canvas.width / 2 + 10) ai.vx = -ai.speed * 0.5;
                    else ai.vx = 0;
                    if (ai.y > 60) ai.vy = -ai.speed * 0.5; else ai.vy = 0;
                }
            }

            ai.x += ai.vx; ai.y += ai.vy;
            ai.x = Math.max(ai.radius, Math.min(canvas.width - ai.radius, ai.x));
            ai.y = Math.max(ai.radius, Math.min(canvas.height / 2 - ai.radius, ai.y));

            // 3. Disk Fiziği & Kuyruk Efekti
            puck.trail.push({x: puck.x, y: puck.y});
            if(puck.trail.length > 12) puck.trail.shift(); 

            puck.vx *= puck.friction; puck.vy *= puck.friction;
            puck.x += puck.vx; puck.y += puck.vy;

            if (puck.x - puck.radius < 0) { puck.x = puck.radius; puck.vx *= -1; }
            if (puck.x + puck.radius > canvas.width) { puck.x = canvas.width - puck.radius; puck.vx *= -1; }

            const isInsideGoalWidth = puck.x > (canvas.width - goalWidth) / 2 && puck.x < (canvas.width + goalWidth) / 2;

            if (puck.y - puck.radius < 0) {
                if (isInsideGoalWidth) handleGoal('player');
                else { puck.y = puck.radius; puck.vy *= -1; }
            }

            if (puck.y + puck.radius > canvas.height) {
                if (isInsideGoalWidth) handleGoal('ai');
                else { puck.y = canvas.height - puck.radius; puck.vy *= -1; }
            }

            checkCollision(player, puck); checkCollision(ai, puck);
        }

        // --- ANA DÖNGÜ ---
        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawSaha();
            drawPuckTrail();
            drawCircle(player);
            drawCircle(ai);
            drawCircle(puck, true);

            if (gameState === "playing") {
                update();
            } else if (gameState === "scored") {
                ctx.fillStyle = "rgba(15, 23, 42, 0.7)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.shadowBlur = 20; ctx.shadowColor = "white";
                ctx.fillStyle = "white"; ctx.font = "900 42px 'Segoe UI'";
                ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillText(goalMessage, canvas.width / 2, canvas.height / 2 - 20);
                
                ctx.shadowBlur = 0;
                ctx.font = "bold 20px 'Segoe UI'"; ctx.fillStyle = "#cbd5e1";
                ctx.fillText(`Skor: ${player.score} - ${ai.score}`, canvas.width / 2, canvas.height / 2 + 30);
            }

            requestAnimationFrame(gameLoop);
        }

        gameLoop();

    </script>
</body>
</html>
